name: CICD

on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning the code"
 
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build using Docker
        run: echo "Building using Docker"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Running test cases
        run: echo "Testing the app"

  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy the code
        run: echo "Deploy the code"
